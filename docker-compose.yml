services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inboxes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-inboxes}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inboxes} -d ${POSTGRES_DB:-inboxes}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-inboxes}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-inboxes}?sslmode=disable
      REDIS_URL: redis://redis:6379
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SESSION_SECRET: ${SESSION_SECRET}
      APP_URL: https://${DOMAIN}
      PUBLIC_URL: ${PUBLIC_URL}
      API_PORT: "8080"
      RESEND_SYSTEM_API_KEY: ${RESEND_SYSTEM_API_KEY:-}
      # ── Commercial mode (leave empty for self-hosted) ──
      STRIPE_KEY: ${STRIPE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      SYSTEM_FROM_ADDRESS: ${SYSTEM_FROM_ADDRESS:-}
      # ── Workers ──
      TRASH_COLLECTOR_ENABLED: ${TRASH_COLLECTOR_ENABLED:-false}
      EVENT_RETENTION_DAYS: ${EVENT_RETENTION_DAYS:-90}
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: https://${DOMAIN}
      NEXT_PUBLIC_WS_URL: wss://${DOMAIN}
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

