  #     - backend
  #     - frontend
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   environment:
  #     DOMAIN: ${DOMAIN}

volumes:
  postgres_data:
  redis_data:
